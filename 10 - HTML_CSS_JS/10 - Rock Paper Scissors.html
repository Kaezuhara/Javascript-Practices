<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="10 - Rock Paper Scissors.css">
</head>
<body>
  <p class="title">Rock Paper Scissors</p>

  <div class="choicesRow">
    <!--Rock-->
    <div class="rockCont">
      <img class="choicesIcon" src="images/rock.png">
    </div>
    <!--Paper-->
    <div class="paperCont">
      <img class="choicesIcon" src="images/paper.png">
    </div>
    <!--Scissors-->
    <div class="scissorsCont">
      <img class="choicesIcon" src="images/scissors.png">
    </div>
  </div>

  <p class="displayUserChoice"></p>
  <p class="displayComputerChoice"></p>
  <p class="displayResult"></p>
  <p class="displayScore"></p>
  <button class="displayResetScore">Reset</button>

  <script src="10 - Rock Paper Scissors.js"></script>
</body>
</html>
