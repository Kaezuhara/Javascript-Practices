<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buttons</title>
  <link rel="stylesheet" href="buttons.css">
</head>
<body>
  <p class="title1">ON / OFF BUTTONS</p>
  <p class="subtitle1">select foods that you like</p>
  
  <div>
    <button class="upperButton1">
      Pizza
    </button>
    
    <button class="upperButton2">
      Lasagna
    </button>
  </div>

  <div>
    <button class="upperButton3">
      Fries
    </button>
    
    <button class="upperButton4">
      Burger
    </button>
  </div>



  <p class="subtitle2">choose your desired superpower</p>
  
  <div>
    <button class="lowerButtons lowerButton1">
      Telekinesis
    </button>
    
    <button class="lowerButtons lowerButton2">
      Invinsibility
    </button>
  </div>

  <div>
    <button class="lowerButtons lowerButton3">
      Teleportation
    </button>
    
    <button class="lowerButtons lowerButton4">
      Time Travel
    </button>
  </div>

  <script src="buttons.js">

  </script>
</body>
</html>
