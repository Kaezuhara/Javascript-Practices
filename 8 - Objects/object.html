<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Objects</title>
</head>
<body>
  <script>

    //Product 1
    const product1 = {
      name: 'basketball',
      price: 2095
    };

    product1.price += 500;
    product1['delivery-time'] = '3 days';

    console.log(product1);

    //Product 1
    const product2 = {
      name: 'volleyball',
      price: 3000,
      'delivery-time': '2 days'
    };

    console.log(product2);

    //Compare Prices
    function comparePrice(){
      if (product1.price > product2.price){
        console.log('Product 2 is cheaper than Product 1');
      } else if (product1.price < product2.price){
        console.log('Product 1 is cheaper than Product 2');
      } else{
        console.log('Product 1 and Product 2 have the same price.');
      }
    }

    comparePrice();
  </script>
</body>
</html>
