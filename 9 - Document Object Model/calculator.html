<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
</head>
<body>
  <p class="displayInput"></p>
  <p class="displayOutput"></p>
  
  <div>
    <!--Digit 1-->
    <button onclick="
      insertNew('1');
      showCurrentResult();
    ">
      1
    </button>

    <!--Digit 2-->
    <button onclick="
      insertNew('2');
      showCurrentResult();
    ">
      2
    </button>

    <!--Digit 3-->
    <button onclick="
      insertNew('3');
      showCurrentResult();
    ">
      3
    </button>
  </div>

  <div>
    <!--Digit 4-->
    <button onclick="
      insertNew('4');
      showCurrentResult();
    ">
      4
    </button>

    <!--Digit 5-->
    <button onclick="
      insertNew('5');
      showCurrentResult();
    ">
      5
    </button>

    <!--Digit 6-->
    <button onclick="
      insertNew('6');
      showCurrentResult();
    ">
      6
    </button>
  </div>

  <div>
    <!--Digit 7-->
    <button onclick="
      insertNew('7');
      showCurrentResult();
    ">
      7
    </button>

    <!--Digit 8-->
    <button onclick="
      insertNew('8');
      showCurrentResult();
    ">
      8
    </button>

    <!--Digit 9-->
    <button onclick="
      insertNew('9');
      showCurrentResult();
    ">
      9
    </button>
  </div>

  <!--Digit 0-->
  <div>
    <button onclick="
      insertNew('0')
      showCurrentResult();
    ">
      0
    </button>
  </div>

  <div>
    <!--Addition Symbol-->
    <button onclick="
      insertNew('+');
    ">
      +
    </button>

    <!--Subtraction Symbol-->
    <button onclick="
      insertNew('-');
    ">
      -
    </button>

    <!--Multiplication Symbol-->
    <button onclick="
      insertNew('*');
    ">
      x
    </button>

    <!--Multiplication Symbol-->
    <button onclick="
      insertNew('/');
    ">
      /
    </button>

    <!--Calculate Symbol-->
    <button onclick="
      calculateResult();
      
    ">
      =
    </button>
  </div>

  <!--Delete-->
  <div>
    <button onclick="
      deleteNew();
    ">
      Delete
    </button>

    <!--Clear-->
    <button onclick="
      clearAll();
    ">
      Clear
    </button>
  </div>

    <!--Javascript-->
    <script>
      let stringInput = document.querySelector('.displayInput');
        stringInput.innerHTML = localStorage.getItem('savedInput') || '';
      let displayOutput = document.querySelector('.displayOutput');

      if(localStorage.getItem('justCalculated') !== 'true'){
        showCurrentResult();
      }

      function insertNew(newVar){
        stringInput.innerHTML += newVar;
        localStorage.setItem('savedInput', stringInput.innerHTML);
        localStorage.removeItem('justCalculated');    // prevents display duplicate when displayInput is from recent calculation.
      }

      // the delete function also contains showCurrentResult().
      // thus, to prevent error when the rightmost character is an operation, try catch is used, waiting for inputs.
      function showCurrentResult(showError = false){    // showError is false by default. calculateResult() checks it.
        try{
          let result = eval(stringInput.innerHTML);
          if (result !== undefined){
            displayOutput.innerHTML = eval(stringInput.innerHTML);
          }
        } catch(e){
          displayOutput.innerHTML = showError ? 'Error' : '';   // calculateResult() checks this.
        }
      }

      function calculateResult(){
        showCurrentResult(true);  // 'true' is used to check for errors.
        if(displayOutput.innerHTML !== 'Error'){
          stringInput.innerHTML = displayOutput.innerHTML;
          displayOutput.innerHTML = '';

          localStorage.setItem('savedInput', stringInput.innerHTML);
          localStorage.setItem('justCalculated', 'true');
          // ^^ when page is reloaded, it prevents display duplicate when the last action is calculateResult().
        }
      }

      // clear all input and storage
      function clearAll(){
        stringInput.innerHTML = '';
        displayOutput.innerHTML = '';
        localStorage.clear();
        alert('clear successful!');
      }

      // remove rightmost character
      function deleteNew(){
        stringInput.innerHTML = stringInput.innerHTML.slice(0, -1);

        // if the displayInput is empty, then so is displayOutput.
        if (stringInput.innerHTML !== ''){
          localStorage.setItem('savedInput', stringInput.innerHTML);
          showCurrentResult();
        } else {
          displayOutput.innerHTML = '';
          localStorage.clear();
        }
      }

    </script>
</body>
</html>
